function quotedTitle(s){
  const m=s.match(/[""]([^""]+)[""]/)||s.match(/"([^"]+)"/);
  return m?m[1]:s.replace(/<[^>]+>/g,'');
}
const UNI_REPOS=[
  {test:/จุฬา/,            label:'คลังจุฬาฯ (CUIR)',      url:'https://cuir.car.chula.ac.th/simple-search?query='},

  {test:/รามคำแหง/,       label:'คลังรามคำแหง',          url:'https://library.lib.ru.ac.th/search?q='},

  {test:/ศรีปทุม/,        label:'คลังศรีปทุม (SPU)',      url:'https://dspace.spu.ac.th/simple-search?query='},
  {test:/สุโขทัย|มสธ|STOU/,label:'คลัง มสธ. (STOU)',      url:'https://www.stou.ac.th/thai/grad_stdy/Masters/search?q='},
  {test:/นิด้า|NIDA/,     label:'คลัง NIDA',             url:'https://repository.nida.ac.th/simple-search?query='},
  {test:/สงขลานครินทร์|ม\.อ\.|มอ\.|PSU/,label:'คลัง ม.อ. (PSUKB)',url:'https://kb.psu.ac.th/search?query='},
  {test:/เชียงใหม่|มช/,   label:'คลัง มช. (CMU)',        url:'http://cmuir.cmu.ac.th/simple-search?query='}
];
function uniRepo(citation){
  for(const u of UNI_REPOS){ if(u.test.test(citation)) return u; }
  return null;
}
function docketList(s){
  const m=s.match(/[ก-๙A-Za-z.]*[๐-๙0-9]+\/[๒๐-๙25][๐-๙0-9]+/g);
  return m?m.join(' '):s.replace(/⚠/g,'').trim();
}
function buildLink(it){
  const t=it.type;
  if(t==='thesis'||t==='research'){
    const title=quotedTitle(it.t);
    const links=[{label:'Google Scholar', href:SCHOLAR+encodeURIComponent(title)}];
    const repo=uniRepo(it.jump);
    if(repo){
      links.push({label:repo.label, href:repo.url+encodeURIComponent(title)});
    }else{
      links.push({label:'ThaiLIS', href:THAILIS+encodeURIComponent(title)});
    }
    return links;
  }
  if(t==='article'){
    const title=quotedTitle(it.t);
    return [{label:'Google Scholar', href:SCHOLAR+encodeURIComponent(title)}];
  }
  if(t==='rkj'){
    return [{label:'ราชกิจจาฯ', href:RKJ+encodeURIComponent(docketList(it.jump))}];
  }
  return [
    {label:'ศาลปกครอง', href:COURT_ADMIN},
    {label:'ศาลยุติธรรม', href:COURT_JUSTICE}
  ];
}

    items:[
      {type:"thesis", t:'สมหมาย ศรีอุดมพันธ์, "การจัดระเบียบบริหารราชการส่วนภูมิภาค"', jump:"วิทยานิพนธ์ ธรรมศาสตร์ ๒๕๔๖"},

    ]

  {
    pg:"๗", title:"๑.๓ ราชการส่วนท้องถิ่น — วิทยานิพนธ์",
    items:[
      {type:"thesis", t:'มณเทียร ศรีทอง, "ภารกิจและอำนาจหน้าที่ขององค์กรปกครองส่วนท้องถิ่นที่เหมาะสม"', jump:"วิทยานิพนธ์ ธุรกิจบัณฑิตย์ ๒๕๔๓"},

      {type:"thesis", t:'สมเกียรติ พงษ์เป็นสุข, "มาตรการทางกฎหมายในการมีส่วนร่วมของประชาชนในการใช้อำนาจกำกับดูแลการกระทำทางปกครองในการที่ส่วนร่วม"', jump:"วิทยานิพนธ์ รามคำแหง ๒๕๔๖", warn:true},

      {type:"thesis", t:'รัตติ สุนทรวราภาส, "ขอบเขตของสัญญาทางปกครองตาม พ.ร.บ.จัดตั้งศาลปกครองและวิธีพิจารณาคดีปกครอง พ.ศ. ๒๕๔๒"', jump:"วิทยานิพนธ์ จุฬาฯ ๒๕๔๗"},

      {type:"thesis", t:'อภิชาต แจ้งยุบล, "เอกสิทธิ์คู่สัญญาฝ่ายรัฐในสัญญาทางปกครอง"', jump:"วิทยานิพนธ์ รามคำแหง ๒๕๕๐"},
      {type:"thesis", t:'สุนันท์ ธรรมศรีรักษ์, "ปัญหาทางกฎหมายเกี่ยวกับเอกสิทธิ์ของคู่สัญญาฝ่ายรัฐในการเลิกสัญญาทางปกครองฝ่ายเดียว"', jump:"วิทยานิพนธ์ ธุรกิจบัณฑิตย์ ๒๕๕๙"},

  {

      {type:"thesis", t:'พัลภา นุ่มน้อย, "ปัญหาเกี่ยวกับสถานะในขั้นตอนการจัดซื้อจัดจ้างในส่วนก่อนสัญญาทางปกครอง"', jump:"วิทยานิพนธ์ ธรรมศาสตร์ ๒๕๔๖"},
      {type:"thesis", t:'กิตติพงษ์ สุวรรณสน, "การบังคับการตามสัญญาทางปกครองในระบบกฎหมายปกครองของไทย"', jump:"วิทยานิพนธ์ รามคำแหง ๒๕๕๙"},
      {type:"thesis", t:'พิษณุ กลั่นนุรักษ์, "ปัญหาทางกฎหมายของการแก้ไขสัญญาทางปกครองในประเทศไทย"', jump:"วิทยานิพนธ์ ธรรมศาสตร์ ๒๕๕๓"},

      {type:"thesis", t:'ชาดรี ดิลกภา, "สัญญาทางปกครองที่ไม่ชอบด้วยกฎหมายที่เกิดขึ้นจากกระบวนการคัดเลือกเอกชนเข้าเป็นคู่สัญญา"', jump:"วิทยานิพนธ์ ธรรมศาสตร์ ๒๕๕๒"},
      {type:"thesis", t:'พรพิมล บุญทวีเวช, "ปัญหาการระงับข้อพิพาทโดยอนุญาโตตุลาการตามสัญญาทางปกครอง"', jump:"วิทยานิพนธ์ รามคำแหง ๒๕๔๔"},
      {type:"thesis", t:'วรวิทย์ กังศศิเทียม, "อนุญาโตตุลาการในสัญญาทางปกครองที่คู่สัญญาฝ่ายเอกชนเป็นเอกชนต่างชาติ"', jump:"วิทยานิพนธ์ จุฬาฯ ๒๕๔๖"},
      {type:"thesis", t:'วรนันท์ ชมบุญ, "การระงับข้อพิพาทโดยกระบวนวิธีพิจารณาชั้นอนุญาโตตุลาการในสัญญาทางปกครอง : ศึกษาเฉพาะกรณีสัญญาก่อสร้างทางด่วน"', jump:"วิทยานิพนธ์ จุฬาฯ ๒๕๔๖"},

      {type:"thesis", t:'ชวลิต เศวตสุต, "สัญญาของฝ่ายปกครองในระบบกฎหมายคอมมอนลอว์ : ศึกษากรณีระบบกฎหมายสหรัฐอเมริกาและอังกฤษเปรียบเทียบกับระบบกฎหมายไทย"', jump:"วิทยานิพนธ์ ธรรมศาสตร์ ๒๕๔๗"},

const DATA = [...DATA_BOOK1, ...DATA_BOOK2];

const main=document.getElementById('main');
const tagLabel={rkj:"ราชกิจจาฯ",thesis:"วิทยานิพนธ์",article:"บทความ",case:"คำพิพากษา",research:"วิจัย"};
let total=0;
const pageSet=new Set();

DATA.forEach((g,gi)=>{
  pageSet.add(g.pg);
  const gv=document.createElement('section');
  gv.className='group';gv.dataset.pg=g.pg;
  const bar=document.createElement('div');bar.className='group-bar';
  bar.innerHTML=`<span class="pg-pill">น.${g.pg}</span><span class="group-title">${g.title}</span>`;
  gv.appendChild(bar);
  const body=document.createElement('div');body.className='group-body';
  g.items.forEach(it=>{
    total++;
    const row=document.createElement('div');row.className='item';
    row.dataset.pg=g.pg;
    row.dataset.search=(it.t+' '+it.jump).toLowerCase();
    const links=buildLink(it);
    const linkHtml=links.map(l=>
      `<a class="srch" href="${l.href}" target="_blank" rel="noopener">${l.label} ↗</a>`
    ).join('');
    
    // Extract title and citation for copy
    const titleMatch = it.t.match(/[^"]*"([^"]+)"/);
    const titleOnly = titleMatch ? titleMatch[1] : it.t;
    const citation = it.jump;
    
    const copyBtns = `
      <button class="copy-btn copy-title" data-text="${titleOnly.replace(/"/g, '&quot;')}">คัดลอกชื่อ</button>
      <button class="copy-btn copy-cite" data-text="${citation.replace(/"/g, '&quot;')}">คัดลอกอ้างอิง</button>
    `;
    
    row.innerHTML=`<div class="item-main"><div class="item-text"><span class="tag ${it.type}">${tagLabel[it.type]}</span>${it.t}</div>`+
        `<div class="cite${it.warn?' warn':''}">${it.jump}</div></div>`+
      `<div class="actions">${linkHtml}${copyBtns}</div>`;
    
    // Add copy event listeners
    row.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const text = e.target.dataset.text;
        navigator.clipboard.writeText(text).then(() => {
          const orig = e.target.textContent;
          e.target.textContent = '✓ คัดลอกแล้ว';
          e.target.classList.add('copied');
          setTimeout(() => {
            e.target.textContent = orig;
            e.target.classList.remove('copied');
          }, 2000);
        });
      });
    });
    
    body.appendChild(row);
  });
  gv.appendChild(body);
  main.appendChild(gv);
});

const chips=document.getElementById('chips');
const sizeCtl=chips.querySelector('.size-ctl');
[...pageSet].forEach(pg=>{
  const b=document.createElement('button');
  b.className='chip';b.dataset.f=pg;b.textContent='น.'+pg;
  chips.insertBefore(b,sizeCtl);
});

const searchEl=document.getElementById('search');
const countEl=document.getElementById('count');
const noRes=document.getElementById('noResults');
let activeFilter='all';

function esc(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function apply(){
  const query=searchEl.value.trim().toLowerCase();
  let shown=0;
  document.querySelectorAll('.item').forEach(it=>{
    const mf=activeFilter==='all'||it.dataset.pg===activeFilter;
    const mq=!query||it.dataset.search.includes(query);
    const show=mf&&mq;it.classList.toggle('hidden',!show);
    const txt=it.querySelector('.item-text');
    if(show&&query){
      const orig=txt.dataset.orig||(txt.dataset.orig=txt.innerHTML);
      try{txt.innerHTML=orig.replace(new RegExp('('+esc(query)+')','gi'),'<mark>$1</mark>');}catch(e){}
    }else if(txt.dataset.orig){txt.innerHTML=txt.dataset.orig;}
    if(show)shown++;
  });
  document.querySelectorAll('.group').forEach(g=>{
    const any=[...g.querySelectorAll('.item')].some(i=>!i.classList.contains('hidden'));
    g.classList.toggle('hidden',!any);
  });
  countEl.innerHTML=`พบ <b>${shown}</b> รายการ`+(query||activeFilter!=='all'?` (จากทั้งหมด ${total})`:'');
  noRes.classList.toggle('show',shown===0);
}
chips.addEventListener('click',e=>{
  const b=e.target.closest('.chip');if(!b)return;
  chips.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  b.classList.add('active');activeFilter=b.dataset.f;apply();
});
searchEl.addEventListener('input',apply);

let fs=1;
function setFs(v){fs=Math.min(1.4,Math.max(.8,v));document.documentElement.style.setProperty('--fs',fs.toFixed(2));}
document.getElementById('inc').onclick=()=>setFs(fs+.1);
document.getElementById('dec').onclick=()=>setFs(fs-.1);

apply();

document.getElementById('pending').innerHTML=
  '<b>✅ ไฟล์รวมสมบูรณ์:</b> ครบทั้ง 2 เล่ม <b>'+total+' รายการ</b><br>'+
  '<b>• เล่มที่ 1:</b> หน้า ๖–๔๔ (มาตรา ๑–๓ + หมวดสัญญาทางปกครอง)<br>'+
  '<b>• เล่มที่ 2:</b> หน้า ๔๕–๖๗ (หมวด ๑ มาตรา ๖–๙ + ส่วนที่ ๓.๒)<br>'+
  '<b>หมายเหตุ:</b> เลขอ้างอิงที่มี ⚠ มาจากภาพสแกนที่ไม่ชัด ควรเทียบกับต้นฉบับ';
