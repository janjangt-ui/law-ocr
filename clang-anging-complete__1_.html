<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คลังอ้างอิงคำพิพากษา — พ.ร.บ.จัดตั้งศาลปกครองฯ (เล่มที่ 1 + 2)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0b;
    --bg-card:#141416;
    --bg-card2:#0f0f11;
    --red:#e11d2e;
    --red-deep:#b3121f;
    --red-bar:#3a0d12;
    --red-bar2:#2a0a0e;
    --ink:#f2eee8;
    --ink-soft:#b9b2a8;
    --ink-faint:#7d766c;
    --line:#26262a;
    --tag-rkj:#caa45a;
    --tag-rkj-bg:rgba(202,164,90,.14);
    --tag-thesis:#5b9bd5;
    --tag-thesis-bg:rgba(91,155,213,.14);
    --tag-article:#6cc18e;
    --tag-article-bg:rgba(108,193,142,.14);
    --tag-case:#d98f4e;
    --tag-case-bg:rgba(217,143,78,.14);
    --link:#ff5b6a;
    --fs:1;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:text;user-select:text}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg);color:var(--ink);
    font-family:'Sarabun',system-ui,sans-serif;
    line-height:1.6;-webkit-font-smoothing:antialiased;
    padding:0 0 6rem;
    font-size:calc(1rem * var(--fs));
  }
  header{padding:1.6rem 1.4rem .8rem;max-width:1180px;margin:0 auto}
  h1{font-size:1.9rem;font-weight:800;letter-spacing:-.01em}
  h1 .accent{color:var(--red)}
  .tagline{color:var(--ink-soft);font-size:.92rem;margin-top:.35rem}
  .tagline a{color:var(--red);text-decoration:none}
  .tagline a:hover{text-decoration:underline}
  .bar{max-width:1180px;margin:0 auto;padding:0 1.4rem}
  .search-wrap{position:relative;margin:1rem 0 .9rem}
  .search-wrap svg{position:absolute;left:1rem;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:var(--ink-faint)}
  #search{
    width:100%;background:var(--bg-card);border:1px solid var(--line);
    border-radius:13px;color:var(--ink);font-family:inherit;
    font-size:1.02rem;padding:.85rem 1rem .85rem 2.7rem;outline:none;
    transition:border-color .15s;
  }
  #search:focus{border-color:var(--red)}
  #search::placeholder{color:var(--ink-faint)}
  .chips-row{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap;padding-bottom:.9rem;border-bottom:2px solid var(--red);margin-bottom:.2rem}
  .chip{
    background:var(--bg-card);border:1px solid var(--line);color:var(--ink-soft);
    font-family:inherit;font-size:.92rem;font-weight:600;
    padding:.5rem 1.05rem;border-radius:24px;cursor:pointer;white-space:nowrap;
    transition:all .13s;
  }
  .chip:hover{border-color:var(--red);color:var(--ink)}
  .chip.active{background:var(--red);border-color:var(--red);color:#fff}
  .size-ctl{margin-left:auto;display:flex;align-items:center;gap:.5rem}
  .size-ctl .lbl{color:var(--ink-faint);font-size:.88rem}
  .size-btn{
    background:#1c1c1f;border:1px solid var(--line);color:#fff;
    width:42px;height:38px;border-radius:9px;cursor:pointer;
    font-family:inherit;font-size:1rem;font-weight:700;
  }
  .size-btn:hover{background:var(--red);border-color:var(--red)}
  .count{max-width:1180px;margin:0 auto;padding:.9rem 1.4rem .2rem;color:var(--ink-soft);font-size:.92rem}
  .count b{color:#fff}
  main{max-width:1180px;margin:0 auto;padding:.4rem 1.4rem 0}
  .group{margin-top:1.4rem;scroll-margin-top:1rem}
  .group-bar{
    background:linear-gradient(180deg,var(--red-bar),var(--red-bar2));
    border:1px solid #4a1118;border-radius:12px 12px 0 0;
    border-bottom:none;
    padding:.85rem 1.1rem;display:flex;align-items:center;gap:.85rem;
  }
  .pg-pill{
    background:#0c0c0d;border:1px solid #5a151d;color:#fff;
    font-weight:700;font-size:.82rem;padding:.22rem .7rem;border-radius:7px;
    white-space:nowrap;flex-shrink:0;
  }
  .group-title{color:#ff8b95;font-weight:800;font-size:1.04rem}
  .group-body{background:var(--bg-card);border:1px solid #4a1118;border-top:none;border-radius:0 0 12px 12px;padding:.9rem 1.1rem}
  .item{padding:.7rem 0;border-bottom:1px solid var(--line);display:flex;align-items:stretch;gap:.8rem;transition:opacity .15s}
  .item:last-child{border-bottom:none}
  .item.hidden{display:none}
  .item-main{flex:1;min-width:0}
  .item-text{color:var(--ink);font-size:.98rem;line-height:1.5;margin-bottom:.4rem}
  .item-text .tag{
    display:inline-block;font-size:.75rem;font-weight:700;padding:.25rem .6rem;border-radius:4px;margin-right:.5rem;
  }
  .tag.rkj{background:var(--tag-rkj-bg);color:var(--tag-rkj)}
  .tag.thesis{background:var(--tag-thesis-bg);color:var(--tag-thesis)}
  .tag.article{background:var(--tag-article-bg);color:var(--tag-article)}
  .tag.case{background:var(--tag-case-bg);color:var(--tag-case)}
  .tag.research{background:var(--tag-case-bg);color:var(--tag-case)}
  mark{background:#4a1118;color:var(--tag-rkj);font-weight:700}
  .cite{color:var(--ink-soft);font-size:.9rem;font-style:italic}
  .cite.warn{color:#f79c73}
  .actions{display:flex;flex-direction:column;gap:.4rem;justify-content:flex-start}
  .srch{
    background:var(--red);color:#fff;text-decoration:none;font-size:.8rem;font-weight:600;
    padding:.3rem .65rem;border-radius:5px;white-space:nowrap;text-align:center;
    transition:background .15s;
  }
  .srch:hover{background:var(--red-deep)}
  .copy-btn{
    background:#26262a;color:var(--tag-rkj);border:1px solid #3a3a3e;
    padding:.3rem .55rem;border-radius:4px;font-size:.75rem;cursor:pointer;
    font-family:inherit;font-weight:600;transition:all .15s;
  }
  .copy-btn:hover,.copy-btn:active{background:#3a3a3e;border-color:var(--tag-rkj)}
  .copy-btn.copied{background:#4a1118;color:#ff8b95}
  #pending{
    max-width:1180px;margin:2rem auto 0;padding:1.4rem;
    background:var(--bg-card);border:1px solid var(--line);border-radius:10px;
    font-size:.9rem;color:var(--ink-soft);line-height:1.6;
  }
  #pending b{color:var(--tag-rkj)}
  #noResults{
    display:none;max-width:1180px;margin:2rem auto;padding:2rem 1.4rem;
    background:var(--bg-card);border:1px solid var(--line);border-radius:10px;
    text-align:center;color:var(--ink-soft);font-size:1.05rem;
  }
  #noResults.show{display:block}
  @media(max-width:600px){
    h1{font-size:1.4rem}
    .item{flex-direction:column;gap:.4rem}
    .item-text{font-size:.95rem}
    .actions{flex-direction:row;flex-wrap:wrap}
  }
</style>
</head>
<body>

<header>
  <h1>คลังอ้างอิงคำพิพากษา <span class="accent">— เล่มที่ 1 + 2 ครบถ้วน</span></h1>
  <p class="tagline">อ้างอิงตามหนังสือ "พ.ร.บ.จัดตั้งศาลปกครองฯ" โดย อำพน–กฤษฎี เจริญชีวินทร์</p>
</header>

<div class="bar">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.35-4.35"></path>
    </svg>
    <input id="search" type="text" placeholder="ค้นหารายการอ้างอิง...">
  </div>
  <div class="chips-row" id="chips">
    <div class="size-ctl">
      <span class="lbl">ขนาด</span>
      <button id="dec" class="size-btn">−</button>
      <button id="inc" class="size-btn">+</button>
    </div>
  </div>
</div>

<div class="count" id="count"></div>
<main id="main"></main>
<div id="noResults">ไม่พบรายการที่ตรงกับการค้นหา</div>

<div id="pending"></div>

<script>
const COURT_ADMIN="https://www.admincourt.go.th";
const COURT_JUSTICE="https://deka.supremecourt.or.th";
const SCHOLAR="https://scholar.google.com/scholar?q=";
const THAILIS="https://tdc.thailis.or.th/tdc/basic.php?query=";
const RKJ="https://ratchakitcha.soc.go.th/search?keyword=";

function quotedTitle(s){
  const m=s.match(/[""]([^""]+)[""]/)||s.match(/"([^"]+)"/);
  return m?m[1]:s.replace(/<[^>]+>/g,'');
}
const UNI_REPOS=[
  {test:/จุฬา/,            label:'คลังจุฬาฯ (CUIR)',      url:'https://cuir.car.chula.ac.th/simple-search?query='},
  {test:/ธรรมศาสตร์/,      label:'คลังธรรมศาสตร์ (TU)',    url:'https://digital.library.tu.ac.th/tu_dc/frontend/Search/index?keyword='},
  {test:/รามคำแหง/,       label:'คลังรามคำแหง',          url:'https://library.lib.ru.ac.th/search?q='},
  {test:/ธุรกิจบัณฑิต/,    label:'คลัง DPU e-Theses',     url:'https://lib.dpu.ac.th/page.php?id=6488&q='},
  {test:/ศรีปทุม/,        label:'คลังศรีปทุม (SPU)',      url:'https://dspace.spu.ac.th/simple-search?query='},
  {test:/สุโขทัย|มสธ|STOU/,label:'คลัง มสธ. (STOU)',      url:'https://www.stou.ac.th/thai/grad_stdy/Masters/search?q='},
  {test:/นิด้า|NIDA/,     label:'คลัง NIDA',             url:'https://repository.nida.ac.th/simple-search?query='},
  {test:/สงขลานครินทร์|ม\.อ\.|มอ\.|PSU/,label:'คลัง ม.อ. (PSUKB)',url:'https://kb.psu.ac.th/search?query='},
  {test:/เชียงใหม่|มช/,   label:'คลัง มช. (CMU)',        url:'http://cmuir.cmu.ac.th/simple-search?query='}
];
function uniRepo(citation){
  for(const u of UNI_REPOS){ if(u.test.test(citation)) return u; }
  return null;
}
function docketList(s){
  const m=s.match(/[ก-๙A-Za-z.]*[๐-๙0-9]+\/[๒๐-๙25][๐-๙0-9]+/g);
  return m?m.join(' '):s.replace(/⚠/g,'').trim();
}
function buildLink(it){
  const t=it.type;
  if(t==='thesis'||t==='research'){
    const title=quotedTitle(it.t);
    const links=[{label:'Google Scholar', href:SCHOLAR+encodeURIComponent(title)}];
    const repo=uniRepo(it.jump);
    if(repo){
      links.push({label:repo.label, href:repo.url+encodeURIComponent(title)});
    }else{
      links.push({label:'ThaiLIS', href:THAILIS+encodeURIComponent(title)});
    }
    return links;
  }
  if(t==='article'){
    const title=quotedTitle(it.t);
    return [{label:'Google Scholar', href:SCHOLAR+encodeURIComponent(title)}];
  }
  if(t==='rkj'){
    return [{label:'ราชกิจจาฯ', href:RKJ+encodeURIComponent(docketList(it.jump))}];
  }
  return [
    {label:'ศาลปกครอง', href:COURT_ADMIN},
    {label:'ศาลยุติธรรม', href:COURT_JUSTICE}
  ];
}
