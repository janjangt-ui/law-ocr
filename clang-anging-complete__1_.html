<script>
const COURT_ADMIN="https://www.admincourt.go.th";
const COURT_JUSTICE="https://deka.supremecourt.or.th";
const SCHOLAR="https://scholar.google.com/scholar?q=";
const THAILIS="https://tdc.thailis.or.th/tdc/basic.php?query=";
const RKJ="https://ratchakitcha.soc.go.th/search?keyword=";

function quotedTitle(s){
  const m=s.match(/[""]([^""]+)[""]/)||s.match(/"([^"]+)"/);
  return m?m[1]:s.replace(/<[^>]+>/g,'');
}
const UNI_REPOS=[
  {test:/จุฬา/,            label:'คลังจุฬาฯ (CUIR)',      url:'https://cuir.car.chula.ac.th/simple-search?query='},
  {test:/ธรรมศาสตร์/,      label:'คลังธรรมศาสตร์ (TU)',    url:'https://digital.library.tu.ac.th/tu_dc/frontend/Search/index?keyword='},
  {test:/รามคำแหง/,       label:'คลังรามคำแหง',          url:'https://library.lib.ru.ac.th/search?q='},
  {test:/ธุรกิจบัณฑิต/,    label:'คลัง DPU e-Theses',     url:'https://lib.dpu.ac.th/page.php?id=6488&q='},
  {test:/ศรีปทุม/,        label:'คลังศรีปทุม (SPU)',      url:'https://dspace.spu.ac.th/simple-search?query='},
  {test:/สุโขทัย|มสธ|STOU/,label:'คลัง มสธ. (STOU)',      url:'https://www.stou.ac.th/thai/grad_stdy/Masters/search?q='},
  {test:/นิด้า|NIDA/,     label:'คลัง NIDA',             url:'https://repository.nida.ac.th/simple-search?query='},
  {test:/สงขลานครินทร์|ม\.อ\.|มอ\.|PSU/,label:'คลัง ม.อ. (PSUKB)',url:'https://kb.psu.ac.th/search?query='},
  {test:/เชียงใหม่|มช/,   label:'คลัง มช. (CMU)',        url:'http://cmuir.cmu.ac.th/simple-search?query='}
];
function uniRepo(citation){
  for(const u of UNI_REPOS){ if(u.test.test(citation)) return u; }
  return null;
}
function docketList(s){
  const m=s.match(/[ก-๙A-Za-z.]*[๐-๙0-9]+\/[๒๐-๙25][๐-๙0-9]+/g);
  return m?m.join(' '):s.replace(/⚠/g,'').trim();
}
function buildLink(it){
  const t=it.type;
  if(t==='thesis'||t==='research'){
    const title=quotedTitle(it.t);
    const links=[{label:'Google Scholar', href:SCHOLAR+encodeURIComponent(title)}];
    const repo=uniRepo(it.jump);
    if(repo){
      links.push({label:repo.label, href:repo.url+encodeURIComponent(title)});
    }else{
      links.push({label:'ThaiLIS', href:THAILIS+encodeURIComponent(title)});
    }
    return links;
  }
  if(t==='article'){
    const title=quotedTitle(it.t);
    return [{label:'Google Scholar', href:SCHOLAR+encodeURIComponent(title)}];
  }
  if(t==='rkj'){
    return [{label:'ราชกิจจาฯ', href:RKJ+encodeURIComponent(docketList(it.jump))}];
  }
  return [
    {label:'ศาลปกครอง', href:COURT_ADMIN},
    {label:'ศาลยุติธรรม', href:COURT_JUSTICE}
  ];
}
